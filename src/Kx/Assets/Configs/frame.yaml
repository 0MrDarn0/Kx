frame:
  style: Default
  topLeft: "KalOnline:Frame:top_left.png"
  topCenter: "KalOnline:Frame:top_center.png"
  topRight: "KalOnline:Frame:top_right.png"

  rightCenter: "KalOnline:Frame:right_center.png"
  bottomRight: "KalOnline:Frame:bottom_right.png"
  bottomCenter: "KalOnline:Frame:bottom_center.png"
  bottomLeft: "KalOnline:Frame:bottom_left.png"
  leftCenter: "KalOnline:Frame:left_center.png"

  fillBitmap: "KalOnline:Frame:fill_bitmap.bmp"
  fillColor: "#282828"
  useFillColor: false

  topWidthOffset: 7
  bottomWidthOffset: 15
  leftHeightOffset: 5
  rightHeightOffset: 5
  fillPosOffset: 5
  fillWidthOffset: 12
  fillHeightOffset: 9

  default:
    title: "KUpdater"
    backgroundColor: "#1E1F22"
    titleBarColor: "#25262B"
    borderColor: "#3A3D46"
    separatorColor: "#3A3D46"
    titleColor: "#F5F5F5"
    closeButtonColor: "#2D2F36"
    closeButtonForegroundColor: "#F5F5F5"
    borderThickness: 1
    cornerRadius: 10
    titleBarHeight: 36
    titlePadding: 14
    titleFontSize: 14
    contentPadding: 10
    closeButtonSize: 24
    closeButtonMargin: 6

controls:
  - type: Label
    id: title
    text: "KUpdater"
    layer: Frame
    color: "#FFA500"
    font:
      name: "Chiller"
      size: 40
      style: "Italic"
    bounds:
      x: 35
      y: 0
      width: 200
      height: 40

  - type: Button
    id: btn_exit
    text: ""
    color: "#FFA500"
    layer: Frame
    skinKey: "KalOnline:Buttons"
    onClick: closeWindow
    bounds:
      x: -34
      y: 16
      width: 17
      height: 17

