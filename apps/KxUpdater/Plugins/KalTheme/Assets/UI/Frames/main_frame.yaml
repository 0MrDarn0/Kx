frame:
  style: Image
  topLeft: "Plugins:KalTheme:Frame:top_left.png"
  topCenter: "Plugins:KalTheme:Frame:top_center.png"
  topRight: "Plugins:KalTheme:Frame:top_right.png"
  rightCenter: "Plugins:KalTheme:Frame:right_center.png"
  bottomRight: "Plugins:KalTheme:Frame:bottom_right.png"
  bottomCenter: "Plugins:KalTheme:Frame:bottom_center.png"
  bottomLeft: "Plugins:KalTheme:Frame:bottom_left.png"
  leftCenter: "Plugins:KalTheme:Frame:left_center.png"
  fillBitmap: "Plugins:KalTheme:Frame:fill_bitmap.bmp"
  fillColor: "#181818"
  useFillColor: true
  topWidthOffset: 7
  bottomWidthOffset: 15
  leftHeightOffset: 5
  rightHeightOffset: 5
  fillPosOffset: 5
  fillWidthOffset: 12
  fillHeightOffset: 9
  default:
    title: "KxUpdater"
    backgroundColor: "#1E1F22"
    titleBarColor: "#25262B"
    borderColor: "#3A3D46"
    separatorColor: "#3A3D46"
    titleColor: "#F5F5F5"
    closeButtonColor: "#2D2F36"
    closeButtonForegroundColor: "#F5F5F5"
    borderThickness: 1
    cornerRadius: 10
    titleBarHeight: 36
    titlePadding: 14
    titleFontSize: 14
    contentPadding: 10
    closeButtonSize: 24
    closeButtonMargin: 6
controls:
  - type: DockPanel
    id: frame_bottom_overlay
    layer: Frame
    children:
      - type: ProgressBar
        id: updater_progress
        visibleBinding: updater.progressVisible
        dock: Bottom
        margin:
          left: 18
          top: -10
          right: 18
          bottom: 15
        properties:
          progressBinding: updater.progress
          fillColor: "#DAA520"
          borderColor: "#7C6E4B"
          backgroundColor: "#101010"
          borderThickness: "1"
  - type: Label
    id: title
    text: "KxUpdater"
    layer: Frame
    color: "#FFA500"
    font:
      name: "chiller"
      size: 40
      style: "Regular"
      resource: "Plugins:KalTheme:Fonts:chiller:chiller.ttf"
    bounds:
      x: 35
      y: 0
      width: 200
      height: 40
    properties:
      visualOffsetX: 0
      visualOffsetY: -18
  - type: Button
    id: btn_exit
    text: ""
    color: "#FFA500"
    layer: Frame
    normalImage: "Plugins:KalTheme:Buttons:btn_exit_normal.png"
    hoverImage: "Plugins:KalTheme:Buttons:btn_exit_hover.png"
    pressedImage: "Plugins:KalTheme:Buttons:btn_exit_click.png"
    onClick: closeWindow
    bounds:
      x: -16
      y: 16
      width: 17
      height: 17
  - type: ServerStatus
    id: updater_server_status
    layer: Frame
    visibleBinding: updater.serverStatus.enabled
    font:
      name: "Segoe UI"
      size: 16
      style: "Regular"
    bounds:
      x: -80
      y: 15
      width: 170
      height: 20
    properties:
      monitoringEnabledBinding: updater.serverStatus.enabled
      displayNameBinding: updater.serverStatus.displayName
      hostBinding: updater.serverStatus.host
      portBinding: updater.serverStatus.port
      checkIntervalBinding: updater.serverStatus.checkIntervalSeconds
      connectTimeoutBinding: updater.serverStatus.connectTimeoutMilliseconds
      checkingTextBinding: updater.serverStatus.checkingText
      onlineTextBinding: updater.serverStatus.onlineText
      offlineTextBinding: updater.serverStatus.offlineText
      timeoutTextBinding: updater.serverStatus.timeoutText
      indicatorSpacing: "5"
      checkingColor: "#DAA520"
      onlineColor: "#8BC34A"
      offlineColor: "#E57373"
      timeoutColor: "#FFB74D"
