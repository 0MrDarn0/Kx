theme: KalOnline
controls:
  - type: StackPanel
    id: updater_panel
    layer: Content
    bounds:
      x: 24
      y: 20
      width: 320
      height: 220
    padding:
      left: 10
      top: 10
      right: 10
      bottom: 10
    properties:
      orientation: Vertical
      spacing: "8"
    children:
      - type: Label
        id: updater_heading
        text: "KalOnline Updater"
        color: "#F5F5F5"
        font:
          name: "Segoe UI"
          size: 16
          style: "Bold"
      - type: Label
        id: updater_status
        text: "Plugin content is active."
        color: "#D9D9D9"
        font:
          name: "Segoe UI"
          size: 12
          style: "Regular"
      - type: Label
        id: updater_hint
        text: "The real patch workflow can now be built inside this plugin."
        color: "#B8BCC6"
        font:
          name: "Segoe UI"
          size: 11
          style: "Regular"
      - type: Button
        id: updater_close_button
        text: "Close"
        onClick: closeWindow
        bounds:
          x: 0
          y: 0
          width: 120
          height: 32
