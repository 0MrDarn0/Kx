frameDefinition: MainWindow
controls:
  - type: Grid
    id: settings_layout
    layer: Content
    padding:
      left: 24
      top: 14
      right: 24
      bottom: 18
    rows:
      - height:
          value: 28
          unit: Pixel
      - height:
          value: 1
          unit: Star
      - height:
          value: 10
          unit: Pixel
      - height:
          value: 32
          unit: Pixel
    columns:
      - width:
          value: 1
          unit: Star
    children:
      - type: Label
        id: settings_subtitle
        text: "Settings"
        color: "#AAA884"
        font:
          name: "cascadia_code"
          size: 25
          style: "Regular"
          resource: "Plugins:ThemePlugin:Fonts:cascadia_code:CaskaydiaCoveNerdFont-SemiBoldItalic.ttf"
        gridRow: 0
        gridColumn: 0
        margin:
          left: 10
          top: 0
          right: 0
          bottom: 0
      - type: Grid
        id: settings_body
        gridRow: 1
        gridColumn: 0
        columns:
          - width:
              value: 1
              unit: Star
        rows:
          - height:
              value: 1
              unit: Star
        children: []
      - type: Grid
        id: settings_footer
        gridRow: 3
        gridColumn: 0
        columns:
          - width:
              value: 1
              unit: Star
        rows:
          - height:
              value: 1
              unit: Star
        children:
          - type: Button
            id: btn_back
            text: Back
            color: "#F5F5F5"
            normalImage: "Plugins:ThemePlugin:Images:Buttons:btn_default_normal.png"
            hoverImage: "Plugins:ThemePlugin:Images:Buttons:btn_default_hover.png"
            pressedImage: "Plugins:ThemePlugin:Images:Buttons:btn_default_click.png"
            onClick: openWindow:MainWindow
            gridRow: 0
            gridColumn: 0
