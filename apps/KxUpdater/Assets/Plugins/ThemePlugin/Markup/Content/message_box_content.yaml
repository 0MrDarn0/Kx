controls:
  - type: Grid
    id: msgbox_layout
    layer: Content
    padding:
      left: 20
      top: 12
      right: 20
      bottom: 16
    rows:
      - height:
          value: 1
          unit: Star
      - height:
          value: 10
          unit: Pixel
      - height:
          value: 32
          unit: Pixel
    columns:
      - width:
          value: 1
          unit: Star
    children:
      - type: Label
        id: msgbox_message
        textBinding: msgbox.message
        color: "#F5F5F5"
        font:
          name: "Malgun Gothic"
          size: 13
          style: "Regular"
        gridRow: 0
        gridColumn: 0
      - type: Grid
        id: msgbox_buttons
        gridRow: 2
        gridColumn: 0
        columns:
          - width:
              value: 1
              unit: Star
          - width:
              value: 8
              unit: Pixel
          - width:
              value: 1
              unit: Star
        rows:
          - height:
              value: 1
              unit: Star
        children:
          - type: Button
            id: btn_ok
            textBinding: msgbox.btn_ok
            color: "#F5F5F5"
            normalImage: "Plugins:ThemePlugin:Images:Buttons:btn_normal.png"
            hoverImage: "Plugins:ThemePlugin:Images:Buttons:btn_hover.png"
            pressedImage: "Plugins:ThemePlugin:Images:Buttons:btn_click.png"
            onClick: msgboxOk
            gridRow: 0
            gridColumn: 0
          - type: Button
            id: btn_cancel
            textBinding: msgbox.btn_cancel
            color: "#F5F5F5"
            normalImage: "Plugins:ThemePlugin:Images:Buttons:btn_normal.png"
            hoverImage: "Plugins:ThemePlugin:Images:Buttons:btn_hover.png"
            pressedImage: "Plugins:ThemePlugin:Images:Buttons:btn_click.png"
            onClick: msgboxCancel
            gridRow: 0
            gridColumn: 2
